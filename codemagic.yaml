workflows:
  ios-capacitor-workflow:
    name: iOS Capacitor Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      # La firma usa una clave privada FIJA guardada en la variable secreta
      # CERTIFICATE_PRIVATE_KEY (grupo `appstore`). Es la pieza clave: como la
      # clave no cambia, `fetch-signing-files --create` encuentra el certificado
      # de distribución que ya existe y lo REUSA. Antes se generaba una clave
      # nueva con `openssl genrsa` en cada build, así que Apple veía una clave
      # distinta y emitía un certificado nuevo cada vez; como el cupo es de 3,
      # a los pocos builds el archive fallaba por falta de perfil.
      groups:
        - appstore
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "tech.elevatefit.app"
        APP_STORE_APP_ID: 6787338355
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up signing
        script: |
          # Guard: sin la clave fija, `fetch-signing-files` generaría una nueva
          # y volvería a quemar un certificado de distribución. Preferimos
          # cortar el build antes que gastar cupo de Apple en silencio.
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "ERROR: falta la variable CERTIFICATE_PRIVATE_KEY (grupo 'appstore')."
            echo "Sin ella cada build crearía un certificado de distribución nuevo."
            exit 1
          fi
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo "0")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
      email:
        recipients:
          - nexora.srv@gmail.com
        notify:
          success: true
          failure: true

  ios-test-build:
    name: iOS Test Build (PR / manual)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - appstore
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "tech.elevatefit.app"
      node: 22
      xcode: latest
    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: false
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Set up signing
        script: |
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "ERROR: falta la variable CERTIFICATE_PRIVATE_KEY (grupo 'appstore')."
            exit 1
          fi
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_DEVELOPMENT --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build unsigned for verification
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - /tmp/xcodebuild_logs/*.log
